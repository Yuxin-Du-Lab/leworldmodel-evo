defaults:
  - _self_

output_model_name: lewm_lerobot_text
output_root_dir: null
subdir: ${hydra:job.id}

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
patch_size: 14
encoder_scale: tiny

data_batch_size: 32

lerobot:
  config_path: /share/yipingye/world_model/config_libero.yaml
  cache_dir: null
  image_size: 224
  action_horizon: 50
  max_samples_per_file: null
  use_augmentation: false

trainer:
  max_epochs: 100
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0

loader:
  batch_size: ${data_batch_size}
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

wandb:
  enabled: True
  config:
    entity: 15640646alan-uestc
    project: lewm_lerobot_text
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: False

wm:
  type: lewm
  history_size: 1
  num_preds: 1
  embed_dim: 192

predictor:
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

text_encoder:
  model_name: openai/clip-vit-base-patch32
  freeze: true
  max_length: 32

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024
